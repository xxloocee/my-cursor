name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "22"
  WAILS_VERSION: "v3.0.0-alpha.74"
  TASK_VERSION: "v3.45.4"

jobs:
  windows-amd64:
    name: Windows AMD64
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: arduino/setup-protoc@v3
        with:
          version: "29.x"
          repo-token: ${{ github.token }}
      - name: Resolve version
        id: release
        shell: pwsh
        run: |
          "version=$(go run ./scripts/release version -config ./build/config.yml)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install build tools
        shell: pwsh
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
          go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build Windows asset
        shell: pwsh
        run: task release:build:windows:amd64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: bin/release/${{ steps.release.outputs.version }}/my-cursor-${{ steps.release.outputs.version }}-windows-amd64.zip
          if-no-files-found: error

  linux-amd64:
    name: Linux AMD64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: arduino/setup-protoc@v3
        with:
          version: "29.x"
          repo-token: ${{ github.token }}
      - name: Resolve version
        id: release
        run: echo "version=$(go run ./scripts/release version -config ./build/config.yml)" >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
      - name: Install build tools
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          go install github.com/go-task/task/v3/cmd/task@${TASK_VERSION}
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: Build Linux asset
        run: task release:build:linux:amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: bin/release/${{ steps.release.outputs.version }}/my-cursor-${{ steps.release.outputs.version }}-linux-amd64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
        include:
          - arch: arm64
            cc: clang -arch arm64
          - arch: amd64
            cc: clang -arch x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: arduino/setup-protoc@v3
        with:
          version: "29.x"
          repo-token: ${{ github.token }}
      - name: Resolve version
        id: release
        run: echo "version=$(go run ./scripts/release version -config ./build/config.yml)" >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install build tools
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          go install github.com/go-task/task/v3/cmd/task@${TASK_VERSION}
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: Build macOS asset
        env:
          CC: ${{ matrix.cc }}
        run: task release:build:macos:${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: bin/release/${{ steps.release.outputs.version }}/my-cursor-${{ steps.release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [windows-amd64, linux-amd64, macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="$(go run ./scripts/release version -config ./build/config.yml)"
          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match build version ${expected_tag}." >&2
            exit 1
          fi
          release_dir="bin/release/${version}"
          mkdir -p "${release_dir}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"
          echo "notes=${release_dir}/.release-notes.md" >> "${GITHUB_OUTPUT}"
      - uses: actions/download-artifact@v4
        with:
          path: ${{ steps.release.outputs.release_dir }}
          merge-multiple: true
      - name: Generate notes and update manifest
        run: |
          go run ./scripts/release notes \
            -config ./build/config.yml \
            -source ./release-notes.md \
            -out "${{ steps.release.outputs.notes }}"
          go run ./scripts/release manifest \
            -config ./build/config.yml \
            -assets-dir "${{ steps.release.outputs.release_dir }}" \
            -out "${{ steps.release.outputs.release_dir }}/update.json" \
            -repo "${GITHUB_REPOSITORY}" \
            -base-name my-cursor \
            -notes "${{ steps.release.outputs.notes }}"
      - name: Verify release assets
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          dir="${{ steps.release.outputs.release_dir }}"
          test -f "${dir}/my-cursor-${version}-windows-amd64.zip"
          test -f "${dir}/my-cursor-${version}-linux-amd64.tar.gz"
          test -f "${dir}/my-cursor-${version}-macos-arm64.tar.gz"
          test -f "${dir}/my-cursor-${version}-macos-amd64.tar.gz"
          test -f "${dir}/update.json"
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          dir="${{ steps.release.outputs.release_dir }}"
          notes="${{ steps.release.outputs.notes }}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --notes-file "${notes}" \
              --latest
          else
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${tag}" \
              --notes-file "${notes}" \
              --latest
          fi
          gh release upload "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "${dir}/update.json" \
            "${dir}"/*.zip \
            "${dir}"/*.tar.gz
